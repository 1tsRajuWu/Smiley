name: Mobile Android APK

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write

jobs:
  android:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG=$(gh api "repos/${{ github.repository }}/releases/latest" --jq .tag_name)
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ "$BRANCH" =~ ^v[0-9] ]]; then
            echo "tag=${BRANCH}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          TAG=$(gh api "repos/${{ github.repository }}/tags" --paginate \
            --jq ".[] | select(.commit.sha == \"${SHA}\") | .name" | head -1)
          if [[ -z "$TAG" ]]; then
            echo "Could not resolve release tag (branch=${BRANCH}, sha=${SHA})" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Build web + sync Capacitor (Android)
        working-directory: mobile
        run: |
          npm run build
          npx cap sync android
          node scripts/configure-native.js

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare APK artifact
        id: apk
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk "Smiley-${VERSION}-android-debug.apk"
          ls -la "Smiley-${VERSION}-android-debug.apk"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.apk.outputs.version }}"
          for i in $(seq 1 20); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" "Smiley-${VERSION}-android-debug.apk" --clobber
              exit 0
            fi
            echo "Waiting for release ${TAG}... (${i}/20)"
            sleep 15
          done
          echo "Release ${TAG} not found" >&2
          exit 1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: smiley-android-debug-apk
          path: Smiley-*-android-debug.apk
