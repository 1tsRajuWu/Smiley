name: Apply Supabase schema

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply install database schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: smxpcmakejgxknpzrspg
        run: |
          set -euo pipefail
          applied=0
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f scripts/install-database-schema.sql
            echo "Schema applied via psql."
            applied=1
          elif [ -n "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            node scripts/apply-install-schema-management-api.js
            applied=1
          fi
          if [ "$applied" != 1 ]; then
            echo "::error::Add SUPABASE_DB_URL (Database → Connection string URI, session mode) or SUPABASE_ACCESS_TOKEN (Account → Access Tokens) to repo secrets, then re-run this workflow."
            exit 1
          fi

      - name: Backfill geo data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then
            echo "Skip backfill — set SUPABASE_SERVICE_KEY (secret key) for geo backfill."
            exit 0
          fi
          node scripts/backfill-install-geo.js
