name: Apply Supabase schema

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply install database schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: smxpcmakejgxknpzrspg
        run: |
          set -euo pipefail
          applied=0

          # Normalize secret (common mistake: quotes, newlines, or host-only paste).
          DB_URL="${SUPABASE_DB_URL:-}"
          DB_URL="$(printf '%s' "$DB_URL" | tr -d '\r\n' | sed -e 's/^["'\'']*//' -e 's/["'\'']*$//' -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [ -n "$DB_URL" ] && ! printf '%s' "$DB_URL" | grep -qE '^postgres(ql)?://'; then
            echo "::warning::SUPABASE_DB_URL must be a full URI starting with postgresql:// (not host/password only)."
            echo "Copy: Supabase → Project Settings → Database → Connection string → URI → Session mode"
            DB_URL=""
          fi

          if [ -n "$DB_URL" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client > /dev/null
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/install-database-schema.sql
            psql "$DB_URL" -v ON_ERROR_STOP=1 -f scripts/migrate-v8-columns.sql
            echo "Schema + v8 columns applied via psql."
            applied=1
          elif [ -n "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            node scripts/apply-install-schema-management-api.js
            applied=1
          fi

          if [ "$applied" != 1 ]; then
            echo "::error::Add a valid SUPABASE_DB_URL (full postgresql://… URI, session mode) or SUPABASE_ACCESS_TOKEN to repo secrets, then re-run."
            exit 1
          fi

      - name: Backfill geo data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "${SUPABASE_SERVICE_KEY:-}" ]; then
            echo "Skip backfill — set SUPABASE_SERVICE_KEY (secret key) for geo backfill."
            exit 0
          fi
          node scripts/backfill-install-geo.js
