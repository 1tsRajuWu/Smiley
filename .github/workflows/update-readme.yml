# README download links are updated by the Release workflow after all platform
# builds finish (see release.yml → update-readme-downloads). This workflow is
# kept as a manual fallback only — the old release:published trigger failed
# because checkout was detached HEAD and assets were not uploaded yet.
name: Update README with Latest Release

on:
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update README download links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-readme-downloads.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/ABOUT.md
          if git diff --staged --quiet; then
            echo "README download links unchanged"
          else
            git commit -m "docs: update README download links for latest release"
            git push origin main
          fi
