name: Release Smiley v8 (Tauri)

on:
  push:
    tags:
      - 'v8.*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Smiley.v8/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Smiley.v8/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: Smiley.v8
        run: npm ci

      - name: Write Discord client id
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: |
          if [ -z "${DISCORD_CLIENT_ID:-}" ]; then
            echo "::error::DISCORD_CLIENT_ID secret required for v8 release builds"
            exit 1
          fi
          printf '%s\n' "{\"clientId\":\"${DISCORD_CLIENT_ID}\"}" > Smiley.v8/src-tauri/discord.app.json

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Smiley.v8
          tagName: ${{ github.ref_name }}
          releaseName: Smiley v8 ${{ github.ref_name }}
          releaseBodyPath: docs/releases/v8.0.0.md
          args: ${{ matrix.args }}
