name: Release Smiley v12 (Tauri)

on:
  push:
    tags:
      - 'v12.*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Smiley.v12/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: Smiley.v12/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: Smiley.v12
        run: npm ci

      - name: Write Discord client id
        shell: bash
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: |
          if [ -z "${DISCORD_CLIENT_ID:-}" ]; then
            echo "::error::DISCORD_CLIENT_ID secret required for v12 release builds"
            exit 1
          fi
          printf '%s\n' "{\"clientId\":\"${DISCORD_CLIENT_ID}\"}" > Smiley.v12/src-tauri/discord.app.json

      - name: Create downloads.registry.json
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY secrets are required for install telemetry"
            exit 1
          fi
          node -e "const fs=require('fs');const u=process.env.SUPABASE_URL.trim().replace(/\\/$/,'');const k=process.env.SUPABASE_ANON_KEY.trim();if(!u.endsWith('.supabase.co')||!k){console.error('Invalid Supabase registry secrets');process.exit(1)}fs.writeFileSync('Smiley.v12/src-tauri/downloads.registry.json',JSON.stringify({supabaseUrl:u,supabaseAnonKey:k}));console.log('Install registry configured for v12')"
          # Fail closed if the file is empty / missing keys
          node -e "const d=require('./Smiley.v12/src-tauri/downloads.registry.json');if(!d.supabaseUrl||!d.supabaseAnonKey){console.error('downloads.registry.json missing credentials');process.exit(1)}"

      - name: Load release notes
        id: relnotes
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          file="docs/releases/v${ver}.md"
          if [ ! -f "$file" ]; then file="docs/releases/v12.0.1.md"; fi
          {
            echo 'body<<RELEASE_EOF'
            cat "$file"
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: Smiley.v12
          tagName: ${{ github.ref_name }}
          releaseName: Smiley v12 ${{ github.ref_name }}
          releaseBody: ${{ steps.relnotes.outputs.body }}
          releaseDraft: true
          args: ${{ matrix.args }}

  publish-release:
    needs: build-tauri
    if: ${{ needs.build-tauri.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish completed draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          notes="docs/releases/v${ver}.md"
          if [ ! -f "$notes" ]; then notes="docs/releases/v12.0.1.md"; fi
          gh release edit "${GITHUB_REF_NAME}" --draft=false --notes-file "$notes" --repo "${GITHUB_REPOSITORY}"
