name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# macOS must publish first: it builds zip + latest-mac.yml (~10 min). Win/Linux
# finish in ~2 min. Parallel matrix used to create the GitHub release before
# latest-mac.yml existed, so Mac "Check for Updates" returned 404 on /latest/.
jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: node -e "const fs=require('fs');const id=process.env.DISCORD_CLIENT_ID;if(!id){console.error('DISCORD_CLIENT_ID secret required');process.exit(1)}fs.writeFileSync('discord.app.json',JSON.stringify({clientId:id}))"

      - name: Build and publish (mac)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:mac -- --publish always

  build-win:
    needs: build-mac
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: node -e "const fs=require('fs');const id=process.env.DISCORD_CLIENT_ID;if(!id){console.error('DISCORD_CLIENT_ID secret required');process.exit(1)}fs.writeFileSync('discord.app.json',JSON.stringify({clientId:id}))"

      - name: Build and publish (win)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win -- --publish always

  build-linux:
    needs: build-mac
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: node -e "const fs=require('fs');const id=process.env.DISCORD_CLIENT_ID;if(!id){console.error('DISCORD_CLIENT_ID secret required');process.exit(1)}fs.writeFileSync('discord.app.json',JSON.stringify({clientId:id}))"

      - name: Build and publish (linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux -- --publish always
