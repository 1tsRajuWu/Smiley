name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_cmd: npm run build:mac -- --publish always
          - os: windows-latest
            platform: win
            build_cmd: npm run build:win -- --publish always
          - os: ubuntu-latest
            platform: linux
            build_cmd: npm run build:linux -- --publish always

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: |
          if [ -z "$DISCORD_CLIENT_ID" ]; then
            echo "DISCORD_CLIENT_ID secret is required for release builds"
            exit 1
          fi
          echo "{\"clientId\":\"$DISCORD_CLIENT_ID\"}" > discord.app.json
        shell: bash

      - name: Build and publish (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build_cmd }}
