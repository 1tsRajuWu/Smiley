name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: write

# Platforms publish to a *draft* GitHub Release (electron-builder releaseType: draft).
# Drafts are invisible on /releases/latest, so auto-update / website downloaders never
# see a half-complete release (e.g. mac-only without latest.yml + Windows .exe).
# create-draft runs first so parallel platform jobs attach assets without racing
# on release creation. A final job undrafts only after all assets are verified.
jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving as-is (will stay/become draft until publish-release)"
            # Ensure it is draft so /releases/latest is not consumed mid-upload
            gh release edit "$TAG" --draft=true || true
          else
            gh release create "$TAG" --draft --title "Smiley ${VERSION}" --notes "Build in progress — assets uploading from CI."
            echo "Created draft release $TAG"
          fi

  build-mac:
    needs: create-draft
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MediaRemote adapter (mac)
        run: npm run build:mediaremote-adapter

      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: node -e "const fs=require('fs');const id=process.env.DISCORD_CLIENT_ID;if(!id){console.error('DISCORD_CLIENT_ID secret required');process.exit(1)}fs.writeFileSync('discord.app.json',JSON.stringify({clientId:id}))"

      - name: Create downloads.registry.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node -e "const fs=require('fs');const u=process.env.SUPABASE_URL,k=process.env.SUPABASE_ANON_KEY;if(u&&k){fs.writeFileSync('downloads.registry.json',JSON.stringify({supabaseUrl:u,supabaseAnonKey:k}));console.log('Install registry configured')}else{console.log('SUPABASE_URL / SUPABASE_ANON_KEY not set — install registry disabled in this build')}"

      - name: Build and publish (mac, draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: 'true'
        run: npm run build:mac -- --publish always

  build-win:
    needs: create-draft
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: node -e "const fs=require('fs');const id=process.env.DISCORD_CLIENT_ID;if(!id){console.error('DISCORD_CLIENT_ID secret required');process.exit(1)}fs.writeFileSync('discord.app.json',JSON.stringify({clientId:id}))"

      - name: Create downloads.registry.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node -e "const fs=require('fs');const u=process.env.SUPABASE_URL,k=process.env.SUPABASE_ANON_KEY;if(u&&k){fs.writeFileSync('downloads.registry.json',JSON.stringify({supabaseUrl:u,supabaseAnonKey:k}));console.log('Install registry configured')}else{console.log('SUPABASE_URL / SUPABASE_ANON_KEY not set — install registry disabled in this build')}"

      - name: Build and publish (win, draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: 'true'
        run: npm run build:win -- --publish always

  build-linux:
    needs: create-draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical --omit=dev

      - name: Create discord.app.json
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
        run: node -e "const fs=require('fs');const id=process.env.DISCORD_CLIENT_ID;if(!id){console.error('DISCORD_CLIENT_ID secret required');process.exit(1)}fs.writeFileSync('discord.app.json',JSON.stringify({clientId:id}))"

      - name: Create downloads.registry.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node -e "const fs=require('fs');const u=process.env.SUPABASE_URL,k=process.env.SUPABASE_ANON_KEY;if(u&&k){fs.writeFileSync('downloads.registry.json',JSON.stringify({supabaseUrl:u,supabaseAnonKey:k}));console.log('Install registry configured')}else{console.log('SUPABASE_URL / SUPABASE_ANON_KEY not set — install registry disabled in this build')}"

      - name: Build and publish (linux, draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: 'true'
        run: npm run build:linux -- --publish always

  publish-release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify platform assets then publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          echo "Waiting briefly for GitHub asset index to settle…"
          sleep 5

          ASSETS="$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join("\n")')"
          echo "Release assets:"
          echo "$ASSETS"

          missing=0
          require() {
            if ! echo "$ASSETS" | grep -qxF "$1"; then
              echo "::error::Missing required asset: $1"
              missing=1
            else
              echo "OK: $1"
            fi
          }

          require "latest.yml"
          require "latest-mac.yml"
          require "Smiley-Setup-${VERSION}.exe"
          require "Smiley-${VERSION}-arm64.dmg"
          require "Smiley-${VERSION}-x64.dmg"
          require "Smiley-${VERSION}.AppImage"

          if [[ "$missing" -ne 0 ]]; then
            echo "::error::Refusing to publish incomplete release $TAG"
            exit 1
          fi

          BODY_FILE="docs/releases/v${VERSION}.md"
          if [[ -f "$BODY_FILE" ]]; then
            gh release edit "$TAG" --draft=false --notes-file "$BODY_FILE"
            echo "Published $TAG (non-draft) with notes from ${BODY_FILE}"
          else
            gh release edit "$TAG" --draft=false
            echo "Published $TAG (non-draft) — no notes file at ${BODY_FILE}"
          fi

  update-readme-downloads:
    needs: [publish-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update README download counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-readme-downloads.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/ABOUT.md
          if git diff --staged --quiet; then
            echo "README download links unchanged"
          else
            git commit -m "docs: update README download links for latest release"
            git push origin main
          fi
